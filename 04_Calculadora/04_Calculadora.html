<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="04_Calculadora.css">

</head>
<body>
    
    <header>

    </header>

    <main>

        <div class="Calculadora">

            <div class="resultado" id="numeros"><strong>0</strong></div>

            <div class="botoes">

                <button class="bg-cinzaclaro">7</button>
                <button class="bg-cinzaclaro">8</button>
                <button class="bg-cinzaclaro">9</button>
                <button class="bg-roxo">⌫</button>

                <button class="bg-cinzaclaro">4</button>
                <button class="bg-cinzaclaro">5</button>
                <button class="bg-cinzaclaro">6</button>
                <button class="bg-cinza">X</button>

                <button class="bg-cinzaclaro">1</button>
                <button class="bg-cinzaclaro">2</button>
                <button class="bg-cinzaclaro">3</button>
                <button class="bg-cinza">-</button>

                <button class="bg-cinza">,</button>
                <button class="bg-cinzaclaro">0</button>
                <button class="bg-cinza">+</button>
                <button class="bg-roxo">=</button>

        </div>

    </main>

    </footer>
